version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql_container
    restart: always  
    environment:
      MYSQL_ROOT_PASSWORD: "#n21tTxbuNfZj8?q"
      MYSQL_DATABASE: iwebxstu_cosmetics
      MYSQL_USER: iwebxstu_cosmetics
      MYSQL_PASSWORD: "#n21tTxbuNfZj8?q"
    ports:
      - "3306:3306"  
    volumes:
      - mysql_data:/var/lib/mysql  
      - ./cmt_db.sql:/docker-entrypoint-initdb.d/init.sql  # Mount cmt_db.sql ไปที่ห้อง initdb เพื่อนำเข้าฐานข้อมูลอัติโนมัติในการรันครั้งแรก

  phpmyadmin:
    image: phpmyadmin/phpmyadmin  
    container_name: phpmyadmin_container
    restart: always
    environment:
      PMA_HOST: mysql  
      MYSQL_ROOT_PASSWORD: "#n21tTxbuNfZj8?q"  # ต้องตรงกับค่าที่กำหนดใน MySQL
    ports:
      - "8082:80"  

volumes:
  mysql_data: